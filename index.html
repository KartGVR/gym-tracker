<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strength Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#e8e8e0;font-family:'DM Mono',monospace;}
.header{padding:16px;border-bottom:1px solid #222;}
.header-title{font-family:'Bebas Neue';font-size:32px;}
.day-tabs{display:flex;gap:6px;padding:10px;}
.day-tab{padding:8px;background:#111;border:none;color:#555;cursor:pointer;}
.day-tab.active{color:#fff;border-bottom:2px solid #e8572a;}
.card{background:#111;border:1px solid #222;padding:12px;margin:10px;border-radius:6px;}
.card-name{font-size:14px;}
.set-row{display:flex;gap:6px;margin-top:6px;}
.set-inp{background:#1a1a1a;border:1px solid #333;color:#fff;padding:6px;width:70px;}
.log-btn{width:100%;padding:14px;background:#e8572a;border:none;margin-top:16px;color:#000;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">YOUR PROGRAM</div>
</div>

<div id="day-tabs"></div>
<div id="app"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSWTDuJxO9RIut4MEcmQ0T3i0ZJIabm_o",
  authDomain: "gym-tracker-6abb9.firebaseapp.com",
  projectId: "gym-tracker-6abb9",
  storageBucket: "gym-tracker-6abb9.firebasestorage.app",
  messagingSenderId: "67734792736",
  appId: "1:67734792736:web:29d4debf01aadf8f30ea45"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= PROGRAM ================= */
const DP={
  A:{label:"Day A",color:"#e8572a",exercises:[
    {id:"chest",name:"Chest Press",sets:3,reps:5},
    {id:"shoulder",name:"Shoulder Press",sets:3,reps:5}
  ]},
  B:{label:"Day B",color:"#2a7be8",exercises:[
    {id:"leg",name:"Leg Press",sets:3,reps:5},
    {id:"row",name:"Seated Row",sets:3,reps:5}
  ]}
};

/* ================= STATE ================= */
let gymData={},sessions=[],activeDay="A";

/* ================= FIREBASE ================= */
async function fbSave(){
  await setDoc(doc(db,"users","default"),{gymData,sessions});
}

async function fbLoad(){
  const snap=await getDoc(doc(db,"users","default"));
  if(snap.exists()){
    const d=snap.data();
    gymData=d.gymData||{};
    sessions=d.sessions||[];
  }
}

/* ================= HELPERS ================= */
function getPR(id){
  let best=null;
  (gymData[id]?.history||[]).forEach(h=>{
    (h.sets||[]).forEach(w=>{
      if(w!=null&&(best===null||w>best))best=w;
    });
  });
  return best;
}

/* ================= RENDER ================= */
function renderTabs(){
  document.getElementById("day-tabs").innerHTML=
    Object.keys(DP).map(k=>`
      <button class="day-tab ${k===activeDay?'active':''}"
      onclick="switchDay('${k}')">${DP[k].label}</button>
    `).join("");
}

function render(){
  renderTabs();
  const d=DP[activeDay];
  const root=document.getElementById("app");

  root.innerHTML=d.exercises.map(ex=>{
    const pr=getPR(ex.id);
    let rows="";
    for(let i=0;i<ex.sets;i++){
      rows+=`
        <div class="set-row">
          <input class="set-inp" id="${ex.id}-${i}" type="number" placeholder="kg">
        </div>`;
    }

    return `
      <div class="card">
        <div class="card-name">${ex.name}</div>
        <div>${ex.sets} x ${ex.reps}</div>
        ${pr?`<div>PR: ${pr} kg</div>`:""}
        ${rows}
      </div>`;
  }).join("") + `<button class="log-btn" onclick="logSession()">LOG SESSION</button>`;
}

/* ================= ACTIONS ================= */
window.switchDay=function(d){activeDay=d;render();}

window.logSession=async function(){
  const d=DP[activeDay];
  const now=new Date().toISOString();
  const exs=[];

  d.exercises.forEach(ex=>{
    const sets=[];
    let used=false;

    for(let i=0;i<ex.sets;i++){
      const val=document.getElementById(`${ex.id}-${i}`).value;
      if(val)used=true;
      sets.push(val?Number(val):null);
    }

    if(used){
      if(!gymData[ex.id])gymData[ex.id]={history:[]};
      gymData[ex.id].history.push({sets,date:now});
      exs.push({name:ex.name,sets});
    }
  });

  if(!exs.length){alert("Enter weights");return;}

  sessions.unshift({date:now,exercises:exs});
  await fbSave();
  render();
}

/* ================= INIT ================= */
async function init(){
  await fbLoad();
  render();
}

init();

</script>
</body>
</html>
