<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strength Tracker</title>

<style>
* { box-sizing: border-box; }
body { background:#0a0a0a; color:#e8e8e0; font-family: monospace; padding:16px; }
button { cursor:pointer; padding:8px; margin:4px; }
input { width:70px; padding:5px; margin:3px; }
.card { background:#111; padding:12px; border-radius:6px; margin-bottom:10px; }
.header { font-size:24px; margin-bottom:10px; }
</style>
</head>

<body>

<div class="header">Strength Tracker (Firebase)</div>
<div id="app"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSWTDuJxO9RIut4MEcmQ0T3i0ZJIabm_o",
  authDomain: "gym-tracker-6abb9.firebaseapp.com",
  projectId: "gym-tracker-6abb9",
  storageBucket: "gym-tracker-6abb9.firebasestorage.app",
  messagingSenderId: "67734792736",
  appId: "1:67734792736:web:29d4debf01aadf8f30ea45"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= PROGRAM ================= */
const DP = {
  A:{label:"Day A",exercises:[
    {id:"chest",name:"Chest Press",sets:3,reps:5},
    {id:"shoulder",name:"Shoulder Press",sets:3,reps:5}
  ]},
  B:{label:"Day B",exercises:[
    {id:"leg",name:"Leg Press",sets:3,reps:5},
    {id:"row",name:"Seated Row",sets:3,reps:5}
  ]},
  C:{label:"Day C",exercises:[
    {id:"chest2",name:"Chest Press",sets:3,reps:5},
    {id:"leg2",name:"Leg Press",sets:3,reps:5}
  ]}
};

/* ================= STATE ================= */
let gymData = {};
let sessions = [];
let activeDay = "A";

/* ================= FIREBASE ================= */
async function fbSave(){
  await setDoc(doc(db,"users","default"),{
    gymData,
    sessions
  });
}

async function fbLoad(){
  const snap = await getDoc(doc(db,"users","default"));
  if(snap.exists()){
    const d = snap.data();
    gymData = d.gymData || {};
    sessions = d.sessions || [];
  }
}

/* ================= HELPERS ================= */
function getPR(id){
  let best = null;
  (gymData[id]?.history || []).forEach(h=>{
    (h.sets || []).forEach(w=>{
      if(w != null && (best===null || w>best)) best = w;
    });
  });
  return best;
}

/* ================= RENDER ================= */
function render(){
  const root = document.getElementById("app");
  const d = DP[activeDay];

  root.innerHTML = `
    <div>
      ${Object.keys(DP).map(k=>`
        <button onclick="switchDay('${k}')">${DP[k].label}</button>
      `).join("")}
    </div>

    <h2>${d.label}</h2>

    ${d.exercises.map(ex=>{
      const pr = getPR(ex.id);
      return `
        <div class="card">
          <strong>${ex.name}</strong>
          <div>${ex.sets} x ${ex.reps}</div>
          ${pr ? `<div>PR: ${pr} kg</div>` : ""}

          ${Array.from({length:ex.sets}).map((_,i)=>`
            <input id="${ex.id}-${i}" type="number" placeholder="kg">
          `).join("")}
        </div>
      `;
    }).join("")}

    <button onclick="logSession()">LOG SESSION</button>

    <h2>Sessions</h2>
    ${sessions.map(s=>`
      <div class="card">
        <div>${new Date(s.date).toLocaleString()}</div>
      </div>
    `).join("")}
  `;
}

/* ================= ACTIONS ================= */
window.switchDay = function(d){
  activeDay = d;
  render();
};

window.logSession = async function(){
  const d = DP[activeDay];
  const now = new Date().toISOString();
  const exs = [];

  d.exercises.forEach(ex=>{
    const sets = [];
    let hasData = false;

    for(let i=0;i<ex.sets;i++){
      const val = document.getElementById(`${ex.id}-${i}`).value;
      if(val) hasData = true;
      sets.push(val ? Number(val) : null);
    }

    if(hasData){
      if(!gymData[ex.id]) gymData[ex.id] = {history:[]};
      gymData[ex.id].history.push({sets,date:now});
      exs.push({name:ex.name,sets});
    }
  });

  if(exs.length === 0){
    alert("Enter at least one weight");
    return;
  }

  sessions.unshift({date:now,exercises:exs});

  await fbSave();
  render();
};

/* ================= INIT ================= */
async function init(){
  await fbLoad();
  render();
}

init();

</script>

</body>
</html>
