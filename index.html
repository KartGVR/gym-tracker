/* ================= FIREBASE ================= */
async function fbLoad(){
  try{
    const snap = await getDoc(doc(db,"users","default"));
    if(snap.exists()){
      const d=snap.data();
      gymData=d.gymData||gymData;
      sessions=d.sessions||sessions;
      program=d.program||program;
      units=d.units||units;

      sv(KD,gymData);
      sv(KS,sessions);
      sv(KP,program);
      sv(KU,units);

      setSUI("ok","Synced");
    }
  }catch(e){
    setSUI("error","Offline mode");
  }
}

async function fbSave(){
  try{
    setSUI("syncing","Saving...");
    await setDoc(doc(db,"users","default"),{
      gymData,sessions,program,units
    });
    setSUI("ok","Saved");
  }catch(e){
    setSUI("error","Save failed");
  }
}

/* ================= INIT ================= */
async function init(){
  render();
  await fbLoad();
  render();
}

// Replace inside logSession:
async function logSession(dk){
  const d=program[dk],now=new Date().toISOString();
  const sexs=[];let anyLogged=false;

  d.exercises.forEach(ex=>{
    const sw=[];let logged=false;
    for(let i=0;i<ex.sets;i++){
      const el=document.getElementById(`si-${ex.id}-${i}`);
      const val=el?parseFloat(el.value):NaN;
      sw.push(isNaN(val)?null:val);
      if(!isNaN(val))logged=true;
    }
    if(logged){
      anyLogged=true;
      if(!gymData[ex.id])gymData[ex.id]={history:[]};
      gymData[ex.id].history.push({sets:sw,date:now});
      const valid=sw.filter(w=>w!=null);
      const mx=valid.length?Math.max(...valid):null;
      if(mx!=null&&(gymData[ex.id].pr==null||mx>gymData[ex.id].pr))gymData[ex.id].pr=mx;
      sexs.push({exId:ex.id,name:ex.name,sets:sw,unit:getUnit(ex.id)});
    }
  });

  if(!anyLogged){alert("Enter at least one weight first.");return;}

  sessions.unshift({id:gid(),dayKey:dk,dayLabel:d.label,date:now,exercises:sexs});
  sv(KD,gymData);sv(KS,sessions);

  await fbSave();

  const btn=document.getElementById("log-btn");
  btn.textContent="✓ SAVED";
  btn.classList.add("saved");

  setTimeout(()=>renderLog(),2000);
}
